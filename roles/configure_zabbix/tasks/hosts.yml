---
- name: Create Zabbix host groups
  community.zabbix.zabbix_group:
    host_groups:
      - Web Certificate
      - Linux Virtual Machines
    state: present

# Odstranění defaultního hostitele pro vyčištění prostředí
- name: Remove default Zabbix server host
  community.zabbix.zabbix_host:
    host_name: Zabbix server
    state: absent
  ignore_errors: true

# Definice koncových uzlů včetně přiřazení monitorovacích šablon
- name: Create Zabbix host for Bastion-srv03
  community.zabbix.zabbix_host:
    host_name: bastion-srv03
    visible_name: Bastion-srv03
    host_groups:
      - name: Linux Virtual Machines
    link_templates:
      - name: Linux by Zabbix agent
    interfaces:
      - type: 1
        main: 1
        useip: 1
        ip: 192.168.1.5
        dns: ""
        port: "10050"
    state: present

- name: Create Zabbix host for Grafana-srv02
  community.zabbix.zabbix_host:
    host_name: grafana-srv02
    visible_name: Grafana-srv02
    host_groups:
      - name: Linux Virtual Machines
    link_templates:
      - name: Linux by Zabbix agent
      - name: Docker by Zabbix agent 2
    interfaces:
      - type: 1
        main: 1
        useip: 1
        ip: 192.168.1.3
        dns: ""
        port: "10050"
    state: present

- name: Create Zabbix host for Zabbix-srv01
  community.zabbix.zabbix_host:
    host_name: zabbix-srv01
    visible_name: Zabbix-srv01
    host_groups:
      - name: Linux Virtual Machines
      - name: Zabbix servers
    link_templates:
      - name: Linux by Zabbix agent
      - name: Docker by Zabbix agent 2
      - name: Zabbix server health
    interfaces:
      - type: 1
        main: 1
        useip: 1
        ip: 192.168.1.2
        dns: ""
        port: "10050"
    state: present

- name: Create Zabbix host for school web certificate
  community.zabbix.zabbix_host:
    host_name: sposdk.cz
    visible_name: SPOS Web Certificate
    host_groups:
      - name: Web Certificate
    link_templates:
      - name: Website certificate by Zabbix agent 2
    interfaces:
      - type: 1
        main: 1
        useip: 1
        ip: 192.168.1.2
        dns: ""
        port: "10050"
    macros:
      - macro: "{$CERT.WEBSITE.HOSTNAME}"
        value: "sposdk.cz"
    state: present

- name: Create Zabbix host for expired.badssl.com SSL certificate
  community.zabbix.zabbix_host:
    host_name: expired.badssl.com
    visible_name: Expired BadSSL Certificate
    host_groups:
      - name: Web Certificate
    link_templates:
      - name: Website certificate by Zabbix agent 2
    interfaces:
      - type: 1
        main: 1
        useip: 0
        ip: ""
        dns: "expired.badssl.com"
        port: "10050"
    macros:
      - macro: "{$CERT.WEBSITE.HOSTNAME}"
        value: "expired.badssl.com"
    state: present